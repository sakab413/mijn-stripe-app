<!DOCTYPE html>
<html>
<head>
    <title>Inloggen bij {{ bank }}</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h3>{{ bank }} Connect</h3>
        <p>Log in om EasyCashBack te machtigen.</p>
        <input type="text" placeholder="Gebruikersnaam">
        <input type="password" placeholder="Pincode">
        <button onclick="this.innerText='Verbinden...'; setTimeout(()=>location.href='/dashboard', 1500)">Inloggen</button>
    </div>
</body>
</html>
