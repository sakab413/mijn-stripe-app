<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | EasyCashBack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 p-10 font-sans min-screen flex flex-col items-center">
    
    <div class="w-full max-w-2xl mb-10">
        <a href="/" class="text-slate-400 hover:text-emerald-600 font-bold flex items-center gap-2 transition">
            <span>←</span> Terug naar Activatie
        </a>
    </div>

    <div class="max-w-2xl w-full">
        <h1 class="text-4xl font-black mb-12 text-center text-slate-900">Welkom terug 👋</h1>
        
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl shadow-slate-200 border border-slate-100 relative">
            <p class="text-[10px] font-black text-emerald-600 uppercase tracking-[0.3em] mb-4">Exclusieve deal voor jou</p>
            
            <h2 class="text-5xl font-black text-slate-900 mb-2 italic tracking-tighter">Nike</h2>
            <div class="flex items-baseline gap-2 mb-10">
                <span class="text-6xl font-black text-emerald-600">€ 12</span>
                <span class="text-slate-400 font-bold">cashback beschikbaar</span>
            </div>

            <hr class="border-slate-50 mb-8">

            <p class="text-xs text-slate-400 leading-relaxed italic">
                Deze aanbieding is gebaseerd op je recente banktransacties en is 24 uur geldig.
            </p>
        </div>
    </div>
</body>
</html>
