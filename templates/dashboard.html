<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Mijn Dashboard | EasyCashBack</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-10 font-sans">
    <div class="max-w-2xl mx-auto">
        
        <a href="/" class="inline-flex items-center text-slate-400 hover:text-emerald-600 mb-8 font-bold transition">
            <span class="mr-2">←</span> Terug naar website
        </a>

        <h1 class="text-3xl font-black mb-10 text-slate-800">Welkom terug 👋</h1>
        
        <div id="no-deal" class="bg-white p-12 rounded-[2rem] border-2 border-dashed border-slate-200 text-center">
            <p class="text-slate-400 font-medium">Je hebt op dit moment geen actieve cashbacks.</p>
            <p class="text-xs text-slate-300 mt-2">Bezoek een webshop om een deal te activeren via de extensie.</p>
        </div>

        <div id="deal-card" class="hidden bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100">
            <p class="text-xs font-bold text-emerald-600 uppercase mb-2">Deal geactiveerd!</p>
            <h2 id="shop" class="text-4xl font-bold text-slate-900 mb-2 italic">Nike</h2>
            <div class="flex items-baseline gap-2">
                <span id="amount" class="text-5xl font-black text-emerald-600">€ 12</span>
                <span class="text-slate-400 font-medium">cashback</span>
            </div>
            <button onclick="alert('Geld wordt gestort!')" class="w-full mt-8 bg-emerald-600 text-white py-4 rounded-xl font-bold">
                Claim Cashback
            </button>
        </div>
    </div>

    <script>
        // Check of de URL eindigt op ?activated=true
        const params = new URLSearchParams(window.location.search);
        if (params.get('activated') === 'true') {
            document.getElementById('no-deal').classList.add('hidden');
            document.getElementById('deal-card').classList.remove('hidden');
        }
    </script>
</body>
</html>
