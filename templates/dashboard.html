<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | EasyCashBack</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8">
    <div class="max-w-4xl mx-auto text-center">
        <h1 class="text-3xl font-bold mb-6 italic text-emerald-600">Jouw Cashback Overzicht</h1>
        
        <div class="bg-white p-8 rounded-2xl shadow-md inline-block min-w-[300px]">
            <p class="text-gray-400 uppercase text-xs font-bold tracking-widest">Laatste verdiende cashback</p>
            <h2 id="shop-name" class="text-2xl font-bold mt-2 text-gray-800 italic text-emerald-600">Laden...</h2>
            <p id="cashback-amount" class="text-4xl font-black mt-2">€ --</p>
        </div>
    </div>

    <script>
        fetch('/api/check-cashback')
            .then(res => res.json())
            .then(data => {
                if(data.status === 'found') {
                    document.getElementById('shop-name').innerText = data.shop;
                    document.getElementById('cashback-amount').innerText = "€ " + data.amount;
                } else {
                    document.getElementById('shop-name').innerText = "Nog geen data";
                }
            })
            .catch(err => console.error("Fout bij ophalen API"));
    </script>
</body>
</html>
