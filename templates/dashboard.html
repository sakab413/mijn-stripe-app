<!DOCTYPE html>
<html>
<head>
    <title>Mijn Saldo | EasyCashBack</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 50px; }
        .container { max-width: 500px; margin: 0 auto; }
        .item { background: #1e293b; padding: 20px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #10b981; }
        .cashback { color: #10b981; font-weight: bold; font-size: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align:center;">Jouw Verdiende Geld</h1>
        <div id="list">Laden van banktransacties...</div>
    </div>

    <script>
        fetch('/api/check-cashback')
            .then(r => r.json())
            .then(data => {
                const list = document.getElementById('list');
                list.innerHTML = "";
                data.deals.forEach(d => {
                    list.innerHTML += `
                        <div class="item">
                            <div><strong>${d.shop}</strong><br><small>Aankoop: €${d.purchase_amount}</small></div>
                            <span class="cashback">+ €${d.cashback}</span>
                        </div>`;
                });
            });
    </script>
</body>
</html>
