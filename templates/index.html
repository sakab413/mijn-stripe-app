<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>EasyCashBack - Geld terug op elke aankoop</title>
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; text-align: center; background: #fff; color: #333; }
        nav { padding: 20px; display: flex; justify-content: space-between; align-items: center; max-width: 1000px; margin: 0 auto; }
        .hero { padding: 100px 20px; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); }
        h1 { font-size: 48px; margin-bottom: 20px; }
        .btn-primary { 
            background: #007bff; color: white; padding: 15px 30px; 
            text-decoration: none; border-radius: 30px; font-weight: bold; font-size: 18px;
            transition: 0.3s; display: inline-block;
        }
        .btn-primary:hover { background: #0056b3; transform: scale(1.05); }
        .features { display: flex; justify-content: center; gap: 40px; padding: 50px; }
    </style>
</head>
<body>
    <nav>
        <div style="font-weight: bold; font-size: 24px;">EasyCashBack</div>
        <a href="/connect-bank" class="btn-primary" style="padding: 10px 20px; font-size: 14px;">Inloggen</a>
    </nav>
    <div class="hero">
        <h1>Geld terug terwijl je slaapt.</h1>
        <p>Koppel je bank en ontvang automatisch cashback op al je favoriete webshops.</p>
        <br>
        <a href="/connect-bank" class="btn-primary">Koppel nu je bank — Het is gratis</a>
    </div>
    <div class="features">
        <div><h3>1. Koppel</h3><p>Veilig via je eigen bank.</p></div>
        <div><h3>2. Shop</h3><p>Zoals je altijd al deed.</p></div>
        <div><h3>3. Cash</h3><p>Ontvang geld terug op je rekening.</p></div>
    </div>
</body>
</html>
