<!DOCTYPE html>
<html>
<head>
    <title>Mijn Overzicht | EasyCashBack</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 40px; }
        .table { width: 100%; max-width: 600px; margin: 0 auto; background: #1e293b; border-radius: 15px; overflow: hidden; }
        .row { display: flex; justify-content: space-between; padding: 20px; border-bottom: 1px solid #334155; }
        .shop-name { font-weight: bold; color: #10b981; }
        .amount { color: #94a3b8; }
    </style>
</head>
<body>
    <h1 style="text-align:center;">Jouw Verdiende Cashback</h1>
    <div class="table" id="cashback-list">
        <div class="row">
            <span>Wachten op transacties...</span>
        </div>
    </div>

    <script>
        // Haal de echte data op van je Render server
        fetch('/api/check-cashback')
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('cashback-list');
                list.innerHTML = ""; // Maak leeg
                
                if (data.deals.length === 0) {
                    list.innerHTML = "<div class='row'>Nog geen aankopen gevonden op je bankrekening.</div>";
                }

                data.deals.forEach(deal => {
                    list.innerHTML += `
                        <div class="row">
                            <div>
                                <span class="shop-name">${deal.shop}</span><br>
                                <small class="amount">Automatisch herkend via bank</small>
                            </div>
                            <div style="color: #10b981; font-weight: bold;">+ €${deal.cashback}</div>
                        </div>
                    `;
                });
            });
    </script>
</body>
</html>
